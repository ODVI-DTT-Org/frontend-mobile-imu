plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

// CI/CD environment variables override key.properties
def keystorePath = System.getenv("KEYSTORE_PATH") ?: keystoreProperties['storeFile']
def keystorePassword = System.getenv("KEYSTORE_PASSWORD") ?: keystoreProperties['storePassword']
def keyAlias = System.getenv("KEY_ALIAS") ?: keystoreProperties['keyAlias']
def keyPassword = System.getenv("KEY_PASSWORD") ?: keystoreProperties['keyPassword']

android {
    namespace "com.odvi.imu"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    signingConfigs {
        release {
            keyAlias keyAlias
            keyPassword keyPassword
            storeFile keystorePath ? file(keystorePath) : null
            storePassword keystorePassword
        }
    }

    defaultConfig {
        applicationId "com.odvi.imu"
        minSdk 23
        targetSdk 36
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}
