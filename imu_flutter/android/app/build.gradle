plugins {
    id "com.android.application"
    id "kotlin-android"
}

def flutterSdkPath = {
    def properties = new Properties()
    file("../local.properties").withInputStream { properties.load(it) }
    def path = properties.getProperty("flutter.sdk")
    assert path != null, "flutter.sdk not set in local.properties"
    return path
}()

apply from: "$flutterSdkPath/packages/flutter_tools/gradle/flutter.gradle"

android {
    namespace "com.odvi.imu"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.odvi.imu"
        minSdk 23
        targetSdk 35
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}
