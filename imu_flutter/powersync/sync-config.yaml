# yaml-language-server: $schema=https://unpkg.com/@powersync/service-sync-rules@latest/schema/sync_rules.json

# PowerSync Sync Rules for IMU
# Edition 3: Each sync stream queries from ONE table only

config:
  edition: 3

streams:
  # Global data - PSGC geographic codes
  global_psgc:
    auto_subscribe: true
    queries:
      - SELECT id, region, province, mun_city_kind, mun_city, barangay, zip_code
        FROM psgc

  # Global data - Touchpoint reasons (Caravan role only)
  global_touchpoint_reasons:
    auto_subscribe: true
    queries:
      - SELECT id, reason_code, label, touchpoint_type, role, category, sort_order, is_active
        FROM touchpoint_reasons
        WHERE is_active = true AND role = 'caravan'

  # User location assignments
  user_locations:
    auto_subscribe: true
    queries:
      - SELECT ul.id, ul.user_id, ul.province, ul.municipality,
          ul.assigned_at, ul.assigned_by, ul.deleted_at
        FROM user_locations ul
        WHERE ul.user_id = auth.user_id() AND ul.deleted_at IS NULL

  # Client data - Sync all clients (user_id removed from clients table)
  clients:
    auto_subscribe: true
    queries:
      - SELECT * FROM clients WHERE deleted_at IS NULL

  # Touchpoints - All touchpoints
  touchpoints:
    auto_subscribe: true
    queries:
      - SELECT * FROM touchpoints

  # Itineraries - For current user
  itineraries:
    auto_subscribe: true
    queries:
      - SELECT * FROM itineraries WHERE user_id = auth.user_id()

  # Approvals - for current user (caravan/tele approvals)
  approvals:
    auto_subscribe: true
    queries:
      - SELECT a.id, a.type, a.status, a.client_id, a.touchpoint_number,
          a.role, a.reason, a.notes,
          a.updated_client_information, a.updated_udi, a.udi_number,
          a.approved_by, a.approved_at, a.rejected_by, a.rejected_at, a.rejection_reason,
          a.created_at, a.updated_at
        FROM approvals a
        WHERE a.status = 'pending'

  # Addresses - for clients assigned to user via area assignments
  addresses:
    auto_subscribe: true
    queries:
      - SELECT a.*, p.region, p.province, p.municipality, p.barangay
        FROM addresses a
        LEFT JOIN psgc p ON a.psgc_id = p.id
        WHERE a.deleted_at IS NULL
          AND a.client_id IN (
            SELECT c.id FROM clients c
            JOIN user_locations ul ON ul.municipality = c.municipality
            WHERE ul.user_id = auth.user_id() AND ul.deleted_at IS NULL
          )

  # Phone numbers - for clients assigned to user via area assignments
  phone_numbers:
    auto_subscribe: true
    queries:
      - SELECT * FROM phone_numbers
        WHERE deleted_at IS NULL
          AND client_id IN (
            SELECT c.id FROM clients c
            JOIN user_locations ul ON ul.municipality = c.municipality
            WHERE ul.user_id = auth.user_id() AND ul.deleted_at IS NULL
          )

