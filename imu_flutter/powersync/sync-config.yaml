# yaml-language-server: $schema=https://unpkg.com/@powersync/service-sync-rules@latest/schema/sync_rules.json

# PowerSync Sync Rules for IMU
# Edition 3: Each sync stream queries from ONE table only

config:
  edition: 3

streams:
  # Global data - PSGC geographic codes
  global_psgc:
    auto_subscribe: true
    queries:
      - SELECT id, region, province, mun_city_kind, mun_city, barangay, pin_location, zip_code
        FROM psgc

  # Global data - Touchpoint reasons
  global_touchpoint_reasons:
    auto_subscribe: true
    queries:
      - SELECT id, code, label, category, description, color, sort_order, is_active
        FROM touchpoint_reasons

  # User profile data
  user_profiles:
    auto_subscribe: true
    queries:
      - SELECT up.id, up.user_id, up.name, up.email, up.role, up.avatar_url,
          up.employee_id, up.first_name, up.last_name, up.phone,
          up.area_manager_id, up.assistant_area_manager_id, up.updated_at
        FROM user_profiles up
        WHERE up.user_id = auth.user_id()

  # User location assignments
  user_locations:
    auto_subscribe: true
    queries:
      - SELECT ul.id, ul.user_id, ul.province, ul.municipality,
          ul.assigned_at, ul.assigned_by, ul.deleted_at
        FROM user_locations ul
        WHERE ul.user_id = auth.user_id() AND ul.deleted_at IS NULL

  # Client data - STRICT territory-based filtering for ALL users
  clients:
    auto_subscribe: true
    queries:
      - SELECT c.id, c.first_name, c.last_name, c.middle_name, c.email, c.phone,
          c.birth_date, c.pan, c.client_type, c.product_type, c.market_type, c.pension_type,
          c.psgc_id, c.province, c.municipality, c.region, c.barangay,
          c.is_starred, c.loan_released, c.udi, c.full_address,
          c.created_at, c.updated_at
        FROM clients c
        WHERE EXISTS (
          SELECT 1 FROM user_locations ul
          WHERE ul.user_id = auth.user_id()
            AND c.province = ul.province
            AND c.municipality = ul.municipality
            AND ul.deleted_at IS NULL
        )

  # Client addresses - STRICT territory-based filtering
  addresses:
    auto_subscribe: true
    queries:
      - SELECT a.id, a.client_id, a.type, a.street, a.barangay, a.city,
          a.province, a.postal_code, a.country, a.is_primary
        FROM addresses a
        WHERE EXISTS (
          SELECT 1 FROM clients c
          WHERE c.id = a.client_id
            AND EXISTS (
              SELECT 1 FROM user_locations ul
              WHERE ul.user_id = auth.user_id()
                AND c.province = ul.province
                AND c.municipality = ul.municipality
                AND ul.deleted_at IS NULL
            )
        )

  # Phone numbers - STRICT territory-based filtering
  phone_numbers:
    auto_subscribe: true
    queries:
      - SELECT p.id, p.client_id, p.phone_type, p.phone_number, p.is_primary
        FROM phone_numbers p
        WHERE p.is_primary = true
          AND EXISTS (
            SELECT 1 FROM clients c
            WHERE c.id = p.client_id
              AND EXISTS (
                SELECT 1 FROM user_locations ul
                WHERE ul.user_id = auth.user_id()
                  AND c.province = ul.province
                  AND c.municipality = ul.municipality
                  AND ul.deleted_at IS NULL
              )
          )

  # Touchpoints - All touchpoints for visible clients (for client history/insights)
  touchpoints:
    auto_subscribe: true
    queries:
      - SELECT t.id, t.client_id, t.user_id, t.touchpoint_number, t.type,
          t.date, t.time_arrival, t.time_departure, t.reason, t.status, t.notes,
          t.photo_path, t.audio_path,
          t.time_in_gps_lat, t.time_in_gps_lng, t.time_in_gps_address,
          t.time_out_gps_lat, t.time_out_gps_lng, t.time_out_gps_address,
          t.created_at, t.updated_at
        FROM touchpoints t
        WHERE EXISTS (
          SELECT 1 FROM clients c
          WHERE c.id = t.client_id
            AND EXISTS (
              SELECT 1 FROM user_locations ul
              WHERE ul.user_id = auth.user_id()
                AND c.province = ul.province
                AND c.municipality = ul.municipality
                AND ul.deleted_at IS NULL
            )
        )

  # Itineraries - for current user
  itineraries:
    auto_subscribe: true
    queries:
      - SELECT i.id, i.client_id, i.user_id, i.scheduled_date, i.scheduled_time,
          i.status, i.priority, i.notes, i.created_by, i.created_at, i.updated_at
        FROM itineraries i
        WHERE i.user_id = auth.user_id()

  # Approvals - for current user (caravan/tele approvals)
  approvals:
    auto_subscribe: true
    queries:
      - SELECT a.id, a.type, a.status, a.client_id, a.touchpoint_number,
          a.role, a.reason, a.notes, a.approved_by, a.approved_at,
          a.created_at, a.updated_at
        FROM approvals a
        WHERE a.role = auth.user_id()
          AND a.status = 'pending'

