# yaml-language-server: $schema=https://unpkg.com/@powersync/cli-schemas@latest/json-schema/service-config.json

# PowerSync Cloud config for IMU
# Docs: https://docs.powersync.com/sync/overview

_type: cloud

name: imu-mobile

region: jp

# -------------------------------------------------------------------------
# Replication: PostgreSQL database connection for sync
# -------------------------------------------------------------------------
replication:
  connections:
    - type: postgresql
      # IMPORTANT: Set URI via environment variable
      # Format: postgresql://USER:PASSWORD@HOST:PORT/DATABASE?sslmode=require
      uri: ${POSTGRES_URI}
      name: imu-production

# -----------------------------------------------------------------------------
# CLIENT AUTH – JWT authentication from backend (RS256)
# -----------------------------------------------------------------------------
client_auth:
  issuer: imu-backend
  jwks:
    keys:
      # RSA public key for IMU JWT authentication (RS256)
      # Updated: 2026-04-02 - New key pair after security incident
      - kty: RSA
        alg: RS256
        kid: imu-production-key-20260402
        use: sig
        n: omX5GoYmUBEMENMHB5Ds2Q9iX5E2oKXG03pio4FB40gJTLNP3D0XVQfNfFdJTFMFbHnx5OkfVqT71sdTPmLv9V-64hPkKDoMPb98F62biVz079TGP7AQ4iU9OjoJXc337CgDjAjuykOmWPzCIjJRtqMUKpTrB2vil2VmzBIG6YsWrKt2fSZvlq6NthsFWkiWOGG9K5lGyJIUi6QJR8urkCYiAlUvvxE3jag4dwb_BZfmtIS1rn0zNjgbrwIEHZiI9hlk_ykOvTu8Ujccnuebu3m4EydOYkvSOvYjOQl98W0ffbVvSA6wR0VCHNaZvnZ21bvz71etWX_mG4vgmSObFQ
        e: AQAB

# -----------------------------------------------------------------------------
# IMPORTANT SECURITY NOTES:
# -----------------------------------------------------------------------------
# 1. Never commit actual credentials or private keys to git
# 2. Use environment variables for sensitive data
# 3. Generate proper RSA keys using: openssl genrsa -out private.pem 2048
# 4. Extract public key using: openssl rsa -in private.pem -pubout -out public.pem
# 5. Set POSTGRES_URI environment variable before deployment
