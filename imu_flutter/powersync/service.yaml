# yaml-language-server: $schema=https://unpkg.com/@powersync/cli-schemas@latest/json-schema/service-config.json

# PowerSync Cloud config for IMU
# Docs: https://docs.powersync.com/sync/overview

_type: cloud

name: imu-mobile

region: jp

# -------------------------------------------------------------------------
# Replication: PostgreSQL database connection for sync
# -------------------------------------------------------------------------
replication:
  connections:
    - type: postgresql
      uri: postgresql://doadmin:AVNS_9pWP_jsbnj7OnOd8KAw@imu-do-user-21438450-0.e.db.ondigitalocean.com:25060/defaultdb
      name: imu-production

# -----------------------------------------------------------------------------
# CLIENT AUTH – JWT authentication from backend
# -----------------------------------------------------------------------------
client_auth:
  # HMAC SHA256 key (same as backend JWT_SECRET)
  jwks:
    keys:
      - kty: oct
        alg: HS256
        kid: imu-jwt-secret
        k:
          secret: qa-jwt-secret-key-min-32-characters-long-for-security
