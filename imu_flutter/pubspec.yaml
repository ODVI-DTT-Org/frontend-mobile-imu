name: imu_flutter
description: IMU (Itinerary Manager Uniformed) - Mobile app for field agents
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # Networking (future backend integration)
  dio: ^5.4.0
  pocketbase: ^0.17.0

  # Maps & Location (temporarily disabled - needs Mapbox SDK token)
  # mapbox_gl: ^0.16.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  # map_launcher: ^6.2.2 (for opening external maps)

  # Media
  image_picker: ^1.0.7
  record: ^6.2.0
  audioplayers: ^5.2.1

  # Authentication
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.0.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  lucide_icons: ^0.257.0

  # Form handling
  flutter_hooks: ^0.20.4
  hooks_riverpod: ^2.4.9

  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.2
  connectivity_plus: ^5.0.2
  flutter_dotenv: ^5.1.0
  quick_actions: ^1.0.7
  uuid: ^4.5.3

  # Firebase (temporarily disabled for web compatibility)
  # firebase_core: ^2.24.2
  # firebase_crashlytics: ^3.4.8
  # firebase_messaging: ^14.7.8

  # Haptic feedback (using built-in HapticFeedback instead)
  # flutter_vibrate: ^1.4.0 - requires Dart SDK ^3.10.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  mocktail: ^1.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env.dev
    - .env.prod

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
