name: imu_flutter
description: IMU (Itinerary Manager Uniformed) - Mobile app for field agents
publish_to: 'none'
version: 1.3.2+5

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.1.0

  # Local Storage (Hive will be deprecated after PowerSync migration)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  path: ^1.9.0

  # PowerSync - Offline-first sync engine
  powersync: ^1.15.1
  # powersync_attachments_client: ^1.15.1 (temporarily unavailable on pub.dev)  # Package not available on pub.dev yet

  # UUID generation
  uuid: ^4.5.1

  # Environment configuration
  flutter_dotenv: ^5.2.1

  # HTTP client for auth
  dio: ^5.7.0

  # JWT decoding for offline auth
  jwt_decoder: ^2.0.1

  # Connectivity
  connectivity_plus: ^6.0.0

  # Maps & Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  google_maps_flutter: ^2.5.3

  # Media
  image_picker: ^1.0.7
  record: ^6.2.0
  audioplayers: ^5.2.1

  # Authentication
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.0.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  lucide_icons: ^0.257.0

  # Form handling
  flutter_hooks: ^0.20.4
  hooks_riverpod: ^2.4.9

  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.2
  quick_actions: ^1.0.7
  crypto: ^3.0.3

  # Permissions
  permission_handler: ^11.0.1

  # Local Notifications
  flutter_local_notifications: ^17.0.0

  # Firebase (temporarily disabled for web compatibility)
  # firebase_core: ^2.24.2
  # firebase_crashlytics: ^3.4.8
  # firebase_messaging: ^14.7.8

  # Haptic feedback (using built-in HapticFeedback instead)
  # flutter_vibrate: ^1.4.0 - requires Dart SDK ^3.10.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  mocktail: ^1.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env.dev
    - .env.prod

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
