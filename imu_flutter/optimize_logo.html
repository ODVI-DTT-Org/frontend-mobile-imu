<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Optimizer Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 24px;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f2ff;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .upload-text {
            color: #666;
            font-size: 16px;
        }
        .upload-hint {
            color: #999;
            font-size: 13px;
            margin-top: 8px;
        }
        #fileInput {
            display: none;
        }
        .preview-section {
            display: none;
            margin-bottom: 24px;
        }
        .preview-section.active {
            display: block;
        }
        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .preview-item {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .preview-item h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        .preview-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 4px;
        }
        .size-info {
            margin-top: 8px;
            font-size: 13px;
            color: #666;
        }
        .savings {
            color: #22c55e;
            font-weight: 600;
        }
        .options {
            display: none;
            margin-bottom: 24px;
        }
        .options.active {
            display: block;
        }
        .option-group {
            margin-bottom: 20px;
        }
        .option-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .quality-slider {
            width: 100%;
            margin-bottom: 8px;
        }
        .quality-value {
            text-align: center;
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
        }
        .format-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .format-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .format-btn:hover {
            border-color: #667eea;
        }
        .format-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        .actions {
            display: none;
        }
        .actions.active {
            display: flex;
            gap: 12px;
        }
        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .btn-secondary {
            background: #eee;
            color: #333;
        }
        .btn-secondary:hover {
            background: #ddd;
        }
        .progress {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .progress.active {
            display: block;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .result {
            display: none;
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
        }
        .result.active {
            display: block;
        }
        .result-title {
            color: #166534;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .result-info {
            color: #15803d;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Logo Optimizer</h1>
        <p class="subtitle">Optimize your IMU logo for faster app loading</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Drop your logo here or click to upload</div>
            <div class="upload-hint">Supports PNG, JPG, JPEG, WebP</div>
        </div>
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">

        <div class="preview-section" id="previewSection">
            <div class="preview-grid">
                <div class="preview-item">
                    <h3>Original</h3>
                    <img id="originalPreview" class="preview-image" alt="Original">
                    <div class="size-info" id="originalSize">Loading...</div>
                </div>
                <div class="preview-item">
                    <h3>Optimized Preview</h3>
                    <img id="optimizedPreview" class="preview-image" alt="Optimized">
                    <div class="size-info" id="optimizedSize">-</div>
                    <div class="savings" id="savings"></div>
                </div>
            </div>
        </div>

        <div class="options" id="options">
            <div class="option-group">
                <label>Quality: <span id="qualityValue">85</span>%</label>
                <input type="range" id="qualitySlider" class="quality-slider" min="10" max="100" value="85">
                <div style="display: flex; justify-content: space-between; font-size: 12px; color: #999;">
                    <span>Smaller file</span>
                    <span>Better quality</span>
                </div>
            </div>

            <div class="option-group">
                <label>Output Format:</label>
                <div class="format-buttons">
                    <button class="format-btn active" data-format="webp">WebP (Recommended)</button>
                    <button class="format-btn" data-format="png">PNG</button>
                    <button class="format-btn" data-format="jpeg">JPEG</button>
                </div>
            </div>
        </div>

        <div class="actions" id="actions">
            <button class="btn btn-secondary" id="resetBtn">Reset</button>
            <button class="btn btn-primary" id="optimizeBtn">Optimize & Download</button>
        </div>

        <div class="progress" id="progress">
            <div class="spinner"></div>
            <div>Optimizing...</div>
        </div>

        <div class="result" id="result">
            <div class="result-title">✅ Optimization Complete!</div>
            <div class="result-info" id="resultInfo"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewSection = document.getElementById('previewSection');
        const originalPreview = document.getElementById('originalPreview');
        const optimizedPreview = document.getElementById('optimizedPreview');
        const originalSize = document.getElementById('originalSize');
        const optimizedSize = document.getElementById('optimizedSize');
        const savings = document.getElementById('savings');
        const options = document.getElementById('options');
        const actions = document.getElementById('actions');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityValue = document.getElementById('qualityValue');
        const optimizeBtn = document.getElementById('optimizeBtn');
        const resetBtn = document.getElementById('resetBtn');
        const progress = document.getElementById('progress');
        const result = document.getElementById('result');
        const resultInfo = document.getElementById('resultInfo');

        let originalFile = null;
        let selectedFormat = 'webp';

        // Format button selection
        document.querySelectorAll('.format-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedFormat = btn.dataset.format;
                updateOptimizedPreview();
            });
        });

        // Quality slider
        qualitySlider.addEventListener('input', (e) => {
            qualityValue.textContent = e.target.value;
            updateOptimizedPreview();
        });

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please upload an image file');
                return;
            }

            originalFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                originalPreview.src = e.target.result;
                originalSize.textContent = formatFileSize(file.size);
                previewSection.classList.add('active');
                options.classList.add('active');
                actions.classList.add('active');
                result.classList.remove('active');
                updateOptimizedPreview();
            };
            reader.readAsDataURL(file);
        }

        async function updateOptimizedPreview() {
            if (!originalFile) return;

            const quality = qualitySlider.value / 100;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();

            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                let mimeType = 'image/webp';
                if (selectedFormat === 'png') mimeType = 'image/png';
                if (selectedFormat === 'jpeg') mimeType = 'image/jpeg';

                const dataUrl = canvas.toDataURL(mimeType, quality);
                optimizedPreview.src = dataUrl;

                // Calculate optimized size
                const base64Length = dataUrl.split(',')[1].length;
                const optimizedBytes = Math.round(base64Length * 3 / 4);
                optimizedSize.textContent = formatFileSize(optimizedBytes);

                // Show savings
                const savedBytes = originalFile.size - optimizedBytes;
                const savedPercent = Math.round((savedBytes / originalFile.size) * 100);
                if (savedBytes > 0) {
                    savings.textContent = `-${savedPercent}% (${formatFileSize(savedBytes)})`;
                    savings.style.color = '#22c55e';
                } else {
                    savings.textContent = `+${Math.abs(savedPercent)}% (${formatFileSize(Math.abs(savedBytes))})`;
                    savings.style.color = '#ef4444';
                }
            };

            img.src = URL.createObjectURL(originalFile);
        }

        optimizeBtn.addEventListener('click', async () => {
            if (!originalFile) return;

            progress.classList.add('active');
            result.classList.remove('active');
            optimizeBtn.disabled = true;

            await new Promise(resolve => setTimeout(resolve, 500));

            const quality = qualitySlider.value / 100;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();

            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                let mimeType = 'image/webp';
                let extension = 'webp';
                if (selectedFormat === 'png') {
                    mimeType = 'image/png';
                    extension = 'png';
                } else if (selectedFormat === 'jpeg') {
                    mimeType = 'image/jpeg';
                    extension = 'jpg';
                }

                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `imu_logo_optimized.${extension}`;
                    a.click();

                    progress.classList.remove('active');
                    result.classList.add('active');
                    optimizeBtn.disabled = false;

                    const savedBytes = originalFile.size - blob.size;
                    const savedPercent = Math.round((savedBytes / originalFile.size) * 100);
                    resultInfo.textContent = `Saved ${savedPercent}% (${formatFileSize(savedBytes)}) - ${formatFileSize(blob.size)} total`;
                }, mimeType, quality);
            };

            img.src = URL.createObjectURL(originalFile);
        });

        resetBtn.addEventListener('click', () => {
            originalFile = null;
            fileInput.value = '';
            previewSection.classList.remove('active');
            options.classList.remove('active');
            actions.classList.remove('active');
            result.classList.remove('active');
            qualitySlider.value = 85;
            qualityValue.textContent = '85';
            selectedFormat = 'webp';
            document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-format="webp"]').classList.add('active');
        });

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }
    </script>
</body>
</html>
